<body> <button id="installBtn" style="background:#a78bfa;color:#000;border:none;padding:12px 20px;border-radius:30px;font-weight:bold;font-size:1rem;width:100%;cursor:pointer;">
    📲 Uygulamayı Telefonuna Ekle
</button>
<script>
    // PWA kurulum butonu
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            if (result.outcome === 'accepted') {
                alert('Uygulama başarıyla eklendi! 🎉');
            } else {
                alert('Kurulum iptal edildi.');
            }
            deferredPrompt = null;
        } else {
            // iOS veya desteklenmeyen tarayıcı için yönlendirme
            alert('Lütfen tarayıcı menüsünden "Ana ekrana ekle" seçeneğini kullanın.\n(Safari: Paylaş > Ana Ekrana Ekle)');
        }
    });

    // iOS için butonu gizle (çünkü beforeinstallprompt çalışmaz)
    if (navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad')) {
        installBtn.style.display = 'block';
        installBtn.textContent = '📲 iOS: Paylaş > Ana Ekrana Ekle';
    }
</script>

</body>
