<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astroloji</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0b0b1a;
            color: #eaeaff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-bottom: 100px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #18182a;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #2d2d4a;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #a78bfa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .install-btn {
            background: #a78bfa;
            color: #000;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.3);
            transition: 0.3s;
        }
        .install-btn:hover {
            transform: scale(1.05);
            background: #34d399;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 Astroloji</h1>
        <p>Uygulamayı telefonuna eklemek için butona tıkla.</p>
        <button class="install-btn" id="installBtn">📲 Uygulamayı Yükle</button>
        <p style="font-size:0.8rem; color:#888;">Android, iOS, Windows, Mac hepsinde çalışır</p>
    </div>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                if (result.outcome === 'accepted') {
                    alert('🎉 Uygulama başarıyla eklendi! Ana ekranda bulabilirsin.');
                } else {
                    alert('Kurulum iptal edildi.');
                }
                deferredPrompt = null;
            } else {
                alert('Lütfen Chrome menüsünden "Ana ekrana ekle" seçeneğini kullanın.');
            }
        });

        if (window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('installBtn').style.display = 'none';
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('✅ Service Worker kaydedildi.'))
                .catch(() => console.log('⚠️ Service Worker kaydedilemedi.'));
        }
    </script>
</body>
</html>
